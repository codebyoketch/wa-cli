name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release, upload assets
  packages: write # push images to ghcr.io

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — GoReleaser's changelog needs prior tags

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        # Needed to build the arm64 Docker image on the amd64 runner.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> 2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Both empty until the companion tap/bucket repos exist (see
          # ROADMAP.md Phase 17) — GoReleaser's brews/scoops publishers
          # will fail the whole release if these are unset while those
          # sections are still enabled in .goreleaser.yaml. Add these
          # secrets under Settings → Secrets and variables → Actions
          # once codebyoketch/homebrew-tap and codebyoketch/scoop-bucket
          # exist, or pass --skip=homebrew,scoop below until then.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
