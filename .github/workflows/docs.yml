name: Docs

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "index.html"
      - "_sidebar.md"
      - ".nojekyll"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # No build step: docsify renders the repo's existing markdown
      # client-side, so the artifact is just the repo root as-is.
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
