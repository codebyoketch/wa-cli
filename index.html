<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>wa-cli</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <meta name="description" content="wa-cli — a WhatsApp CLI and TUI built on whatsmeow" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --theme-color: #25d366; /* WhatsApp green */
    }
    .markdown-section pre > code {
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'wa-cli',
      repo: 'https://github.com/codebyoketch/wa-cli',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'README.md',
      alias: {
        '/CHANGELOG': '/CHANGELOG.md',
        '/ROADMAP': '/ROADMAP.md',
        '/ARCHITECTURE': '/ARCHITECTURE.md',
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search docs',
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied',
      },
      mermaidConfig: {
        startOnLoad: false,
      },
    };

    // Render mermaid code fences (used in ARCHITECTURE.md) as diagrams.
    window.mermaid = { startOnLoad: false };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
  </script>
</body>
</html>
