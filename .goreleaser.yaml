version: 2

project_name: wa-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: wa
    main: .
    binary: wa
    env:
      # modernc.org/sqlite is pure Go (no cgo), and nothing else wa-cli
      # depends on needs cgo either — see ARCHITECTURE.md /
      # go.mod. CGO_ENABLED=0 keeps cross-compilation simple: no
      # per-target C toolchain needed for any GOOS/GOARCH combination
      # below.
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows on arm64 is a real but rare target; skipping it keeps
      # the release matrix smaller until someone actually asks for it.
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/codebyoketch/wa-cli/internal/version.Version={{.Version}}
      - -X github.com/codebyoketch/wa-cli/internal/version.Commit={{.ShortCommit}}
      - -X github.com/codebyoketch/wa-cli/internal/version.BuildDate={{.Date}}

archives:
  - id: default
    ids: [wa]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: codebyoketch
    name: wa-cli
  draft: false
  prerelease: auto
  # ROADMAP.md/CHANGELOG.md already carry the detailed history; keep
  # the GitHub Release notes to GoReleaser's auto-generated commit list
  # rather than duplicating that prose here.

# Homebrew tap: publishes a cask to codebyoketch/homebrew-tap so
# `brew install codebyoketch/tap/wa-cli` works. Needs that repo to
# exist and a HOMEBREW_TAP_GITHUB_TOKEN secret (a PAT with repo scope
# on it) in this repo's Actions secrets — the default GITHUB_TOKEN
# can't push to a different repo. See ROADMAP.md Phase 17 for the
# one-time setup steps; until both exist, run
# `goreleaser release --help` to find the exact `--skip` value for
# this pipe (it changed when brews -> homebrew_casks) and skip it,
# rather than letting this step fail the whole release.
#
# homebrew_casks (not the older brews:, fully deprecated as of
# GoReleaser v2.16 per `goreleaser check`) is Homebrew's own preferred
# way to distribute a precompiled binary — unlike brews, it doesn't
# need a manual `bin.install`/`test` Ruby block; GoReleaser installs
# the binary from the archive automatically.
homebrew_casks:
  - name: wa-cli
    # The archive's actual executable is named "wa" (see builds.binary
    # above), not "wa-cli" — without this, GoReleaser defaults the
    # cask's expected binary name to match `name:` (wa-cli), which
    # doesn't exist in the archive and breaks `brew install` with
    # "It seems the symlink source ... is not there." Confirmed via a
    # real `brew install codebyoketch/tap/wa-cli` run against v0.1.2.
    binary: wa
    repository:
      owner: codebyoketch
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/codebyoketch/wa-cli"
    description: "A WhatsApp client for your terminal, built on whatsmeow"
    license: "MIT"
    commit_author:
      name: Oketch Dishon
      email: oketchdishon@gmail.com

# Scoop bucket: same idea as the Homebrew tap, for Windows —
# `scoop bucket add wa-cli https://github.com/codebyoketch/scoop-bucket`
# then `scoop install wa-cli`. Needs codebyoketch/scoop-bucket to exist
# and the same PAT as SCOOP_BUCKET_GITHUB_TOKEN (can reuse the
# Homebrew tap token's value under a second secret name, or a
# dedicated one — either works, GitHub secrets aren't shared across
# names automatically).
scoops:
  # NOTE: homebrew_casks above had this exact class of bug — GoReleaser
  # defaulting the expected binary name to `name:` (wa-cli) instead of
  # the archive's actual binary (wa) — confirmed via a real `brew
  # install` failure against v0.1.2. Untested whether `scoops:` has the
  # same default-inference behavior; nobody's run `scoop install
  # wa-cli` yet to confirm one way or the other. If it fails the same
  # way, GoReleaser's scoop field for this is `bin:` (not `binary:`,
  # that's homebrew's field name) — check `goreleaser` docs for the
  # exact key before guessing at YAML here blind again.
  - name: wa-cli
    repository:
      owner: codebyoketch
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    homepage: "https://github.com/codebyoketch/wa-cli"
    description: "A WhatsApp client for your terminal, built on whatsmeow"
    license: MIT

# dockers_v2 (not the older split dockers:/docker_manifests:, being
# phased out per `goreleaser check`) builds and pushes a multi-arch
# manifest in one step via buildx — GoReleaser reuses the binaries it
# already built above rather than rebuilding inside Docker.
dockers_v2:
  - images:
      - "ghcr.io/codebyoketch/wa-cli"
    tags:
      - "{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.source": "https://github.com/codebyoketch/wa-cli"
      "org.opencontainers.image.licenses": "MIT"
      "org.opencontainers.image.description": "A WhatsApp client for your terminal, built on whatsmeow"
      